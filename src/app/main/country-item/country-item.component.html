<div class="item" [style]="getTheme()" >
    <div class="item-image" [style]="getImage()"></div>
    <div class="item-description"  >
    <h3>{{country.getName()}}</h3>
    <span class="disc"><b>Population : </b>{{country.getPopulation()}}</span>
    <span class="disc"><b>Region : </b>{{country.getRegion()}}</span>
    <span class="disc"><b>Capital: </b>{{country.getCapital()}}</span>
    </div>
</div>
